name: Publish to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build (if frontend exists)
        run: |
          if [ -d ./frontend ]; then
            echo "Found frontend folder — installing and building"
            cd frontend
            if [ -f package.json ]; then
              npm ci || npm install
              if npm run build; then
                echo "frontend build succeeded"
              else
                echo "frontend build failed — continuing to deploy existing dist if present"
              fi
            else
              echo "frontend/package.json missing — skipping frontend build"
            fi
            cd ..
            # Copy frontend/dist to repo-level dist if it exists
            if [ -d ./frontend/dist ]; then
              rm -rf ./dist || true
              mkdir -p ./dist
              cp -r ./frontend/dist/* ./dist/
              echo "Copied frontend/dist -> ./dist"
            fi
          else
            echo "No frontend folder found — using repo-level ./dist if present"
          fi

      - name: Show dist contents (debug)
        run: |
          echo "Dist listing:"; ls -la ./dist || echo "./dist not present"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
