name: Publish to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          if [ -f package.json ]; then npm ci || npm install; else echo "No frontend package.json, skipping install"; fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          if [ -f package.json ]; then npm run build || echo "npm run build failed or not configured"; else echo "No package.json, skipping build"; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
