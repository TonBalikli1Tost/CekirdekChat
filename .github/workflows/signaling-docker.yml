name: Build and push signaling Docker image

on:
  push:
    paths:
      - 'signaling_js/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./signaling_js
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cekirdek-signaling:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cekirdek-signaling:latest
